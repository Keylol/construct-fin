name: Migrate Jon Data v2

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Copy and run migration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key \
            scripts/migrate_jon_data_v2.py \
            root@$DEPLOY_HOST:/tmp/migrate_jon_data_v2.py
          ssh -i ~/.ssh/deploy_key root@$DEPLOY_HOST bash -e << 'EOF'
            cd /srv/construct/app
            .venv/bin/pip install asyncpg python-dotenv -q
            .venv/bin/python /tmp/migrate_jon_data_v2.py
            rm -f /tmp/migrate_jon_data_v2.py
          EOF
